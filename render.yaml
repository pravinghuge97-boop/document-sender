services:
  - type: web
    name: docedit-backend
    env: python
    region: oregon
    plan: free
    runtime:
      runtimeImage: python-3.11
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd backend &&
      python manage.py migrate
    startCommand: cd backend && gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://*.onrender.com

  - type: web
    name: docedit-frontend
    env: node
    region: oregon
    plan: free
    runtime:
      node: 18
    buildCommand: >
      cd frontend &&
      npm install &&
      npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: VITE_API_BASE_URL
        value: https://docedit-backend.onrender.com/api

databases:
  - name: postgres-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
